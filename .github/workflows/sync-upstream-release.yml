name: sync upstream release

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/1204244136/MDA.git
          git fetch upstream main --tags

      - name: Merge upstream
        id: merge
        run: |
          before=$(git rev-parse HEAD)
          git merge --no-edit upstream/main
          after=$(git rev-parse HEAD)
          echo "changed=$([ "$before" != "$after" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Push branch
        if: steps.merge.outputs.changed == 'true'
        run: git push origin HEAD:main

      - name: Create release tag
        if: steps.merge.outputs.changed == 'true'
        id: tag
        run: |
          patch=$((10#$(date -u +%H%M)))
          tag="v1.$(date -u +%Y%m%d).$patch"
          git tag "$tag"
          git push origin "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Trigger release build
        if: steps.merge.outputs.changed == 'true'
        run: gh workflow run install.yml --ref "${{ steps.tag.outputs.tag }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
